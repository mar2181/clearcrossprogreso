name: verify

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (includes type check)
        run: npm run build
        env:
          # Build must succeed with no secrets configured (mock mode)
          USE_MOCK_DATA: mock
